spring:
  profiles:
    active: all-in-one
  datasource:
    url: jdbc:h2:mem:observe;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

observe:
  worker:
    enabled: true
    runner-core: 4
    runner-max: 16
    runner-queue: 1000
    cron-scheduler-pool-size: 4
    # B9 §3.2 单事件分发器配置（内部有界队列 + N 分发线程）
    dispatch-queue-size: 1000
    dispatch-threads: 2
    ibm-mq:
      enabled: false
      host: localhost
      port: 1414
      queue-manager: QM1
      channel: DEV.APP.SVRCONN
      queue: APP.Q
  alerting:
    resolve-job:
      interval-millis: 60000
      batch-size: 1000
    silence:
      cache-ttl-millis: 10000
